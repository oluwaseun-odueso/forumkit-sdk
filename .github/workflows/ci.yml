name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: forumkit_test
          POSTGRES_USER: forumkit
          POSTGRES_PASSWORD: forumkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run migrations
        run: npm run migrate --workspace=packages/db
        env:
          DATABASE_URL: postgresql://forumkit:forumkit@localhost:5432/forumkit_test
          EMBEDDING_DIMENSION: '384'

      - name: Test with coverage
        run: npm test -- --coverage
        env:
          DATABASE_URL: postgresql://forumkit:forumkit@localhost:5432/forumkit_test
          DATABASE_POOL_URL: postgresql://forumkit:forumkit@localhost:5432/forumkit_test
          FORUM_SECRET_KEY: test-secret-key
          NODE_ENV: test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build
